[mgr]
show_symlink = true
linemode = "mtime"
ratio = [1, 3, 5]
sort_by = "mtime"
sort_dir_first = true
sort_reverse = true
sort_sensitive = true

[[mgr.prepend_keymap]]
on   = [ "g", "d" ]
run  = "cd ~/Downloads"
desc = "Cd to ~/Downloads"

[[mgr.prepend_keymap]]
on   = [ "g", "p" ]
run  = "cd ~/Pictures"
desc = "Cd to ~/Pictures"

[preview]
cache_dir = ""
image_filter = "lanczos3"
image_quality = 90
max_height = 1600
max_width = 1200
tab_size = 1
ueberzug_offset = [0, 0, 0, 0]
ueberzug_scale = 1

[tasks]
bizarre_retry = 5
macro_workers = 10
micro_workers = 5
